<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weight Management Dashboard</title>
  <!-- <script src="/chart.min.js"></script> -->

  <style>
    /* Viewport pentru mobil */
    meta[name="viewport"] {
      width: device-width;
      initial-scale: 1.0;
    }

    /* Stil general */
    body {
      font-family: Arial, sans-serif;
      margin: 10px;
      padding: 0;
    }

    /* Titlu */
    .weight-management-title {
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
    }

    /* Layout principal */
    .box-chart-tabs {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* Container chart */
    .weight-chart-container {
      width: 100%;
      max-width: 900px;
      height: 60vh;
      min-height: 300px;
      margin-top: 10px;
      border: 1px solid gray;
    }

    /* Tabs */
    .tabs {
      display: flex;
      justify-content: center;
      margin-top: 10px;
      gap: 5px;
      flex-wrap: wrap;
    }

    .tabs button {
      padding: 8px 14px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      color: black;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }

    .tabs button.active {
      background: #007bff;
      color: #fff;
      border-color: #007bff;
    }

    /* Calendar */
    .calendar-container {
      width: 100%;
      max-width: 300px;
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 6px;
      margin: 0 auto;
    }

    .month-controls,
    .year-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      margin-bottom: 5px;
    }

    .year-controls {
      justify-content: center;
      gap: 20px;
    }

    .arrow {
      cursor: pointer;
      font-size: 18px;
      padding: 5px;
      user-select: none;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      text-align: center;
    }

    .day {
      padding: 6px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }

    .day:hover {
      background: #e0e0e0;
    }

    .selected {
      background: #007bff;
      color: white;
    }

    .weekday {
      font-weight: bold;
      font-size: 12px;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* 🔵 MEDIA QUERIES PENTRU MOBIL */
    @media (max-width: 600px) {

      body {
        margin: 5px;
      }

      .weight-management-title {
        font-size: 1rem;
      }

      .calendar-container {
        max-width: 100%;
        padding: 8px;
      }

      .month-controls,
      .year-controls {
        font-size: 14px;
      }

      .arrow {
        font-size: 16px;
      }

      .day {
        padding: 4px;
        font-size: 12px;
      }

      .weight-chart-container {
        height: 45vh;
        min-height: 250px;
        border: 1px solid gray
      }

      .tabs button {
        padding: 6px 10px;
        font-size: 12px;
      }

      canvas {
        width: 100% !important;
        height: 100% !important;
      }
    }

  </style>
</head>

<body>
  <div class="weight-management-title">
    <span class="weight-management-title">Cantar Wi-Fi</span>
  </div>
  <div class="calendar-container">

  <!-- CONTROALE PENTRU AN -->
  <div class="year-controls">
    <span class="arrow" id="prevYear">&#9650;</span>
    <span id="yearLabel" style="font-size: 15px;"></span>
    <span class="arrow" id="nextYear">&#9660;</span>
  </div>

  <!-- CONTROALE PENTRU LUNĂ -->
  <div class="month-controls">
    <span class="arrow" id="prevMonth">&#9664;</span>
    <span id="monthLabel"></span>
    <span class="arrow" id="nextMonth">&#9654;</span>
  </div>

  <!-- GRID ZILE -->
  <div class="calendar-grid" id="calendarGrid">
    <div class="weekday">Lu</div>
    <div class="weekday">Ma</div>
    <div class="weekday">Mi</div>
    <div class="weekday">Jo</div>
    <div class="weekday">Vi</div>
    <div class="weekday">Sa</div>
    <div class="weekday">Du</div>
  </div>

  </div>
  <div class="box-chart-tabs">
    <!-- Chart -->
    <div class="weight-chart-container">
      <canvas id="weightChart"></canvas>
    </div>
      <!-- Tabs -->
    <div class="tabs">
      <button id="tab-day" class="active">Day</button>
      <button id="tab-month">Month</button>
      <button id="tab-year">Year</button>
    </div>
  </div>

<script>
const now = new Date();  
let dayEntries = [];
let monthEntries = [];
let yearEntries = [];
let currentMode = 'day';
let chart;
let selectedYear = now.getFullYear();
let selectedMonth = now.getMonth();
let selectedDay = now.getDate();

// Load NDJSON
document.addEventListener('DOMContentLoaded', async () => {
  setTimeRTConESP();
  initTabs();
  updateEntries();
  updateChart();
});
// Get measurements per day/month/year
async function getWeightPerDay(year, month, day) {
  try {
    const response = await fetch(`/data?year=${year}&month=${month}&day=${day}`);
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    const data = await response.json(); 
    return data;
  } catch (error) {
    console.error('Error fetching daily data:', error);
    return [];
  }
}
async function getWeightPerMonth(year, month) {
  try {
    const response = await fetch(`/data?year=${year}&month=${month}`);
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    const data = await response.json(); 
    return data;
  } catch (error) {
    console.error('Error fetching monthly data:', error);
    return [];
  }
}
async function getWeightPerYear(year) {
  try {
    const response = await fetch(`/data?year=${year}`);
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    const data = await response.json(); 
    return data;
  } catch (error) {
    console.error('Error fetching yearly data:', error);
    return [];
  }
}
function setTimeRTConESP() {
  const now = new Date();
  const payload = {
    year: now.getFullYear(),
    month: now.getMonth() + 1,
    day: now.getDate(),
    hour: now.getHours(),
    minute: now.getMinutes(),
    second: now.getSeconds()
  };
  console.log('Setting RTC with payload:', payload);
  fetch('/setRTC', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(response => response.text())
  .then(msg => {
    console.log('RTC set response:', msg);
  });
}
function updateEntries() {
  if (currentMode === 'day')
    getWeightPerDay(selectedYear, selectedMonth + 1, selectedDay).then(data => {
      dayEntries = data;
      updateChart();
    });
  if (currentMode === 'month')
    getWeightPerMonth(selectedYear, selectedMonth + 1).then(data => {
      monthEntries = data;
      updateChart();
    });
  if (currentMode === 'year')
    getWeightPerYear(selectedYear).then(data => {
      yearEntries = data;
      updateChart();
    });
}
// Tabs logic
function initTabs() {
  ['tab-day','tab-month','tab-year'].forEach(id => {
    document.getElementById(id).addEventListener('click', () => {
      currentMode = id.replace('tab-', '');
      setActiveTab(id);
      updateEntries();
    });
  });
}

function setActiveTab(id) {
  ['tab-day','tab-month','tab-year'].forEach(tid => {
    document.getElementById(tid).classList.toggle('active', tid === id);
  });
}

// Chart update
function updateChart() {
  const year = selectedYear;
  const month = selectedMonth;
  const day = selectedDay;

  let labels = [];
  let data = [];

  if (currentMode === 'year') {
    yearEntries.forEach(entry => {
      labels.push(`${entry.month}`);
      data.push(entry.data[0].weight);
    });
    renderChart(labels, data);
    return;
  }

  if (currentMode === 'month') {
    monthEntries.forEach(entry => {
      labels.push(`${entry.day}`);
      data.push(entry.weight);
    });
    renderChart(labels, data);
    return;
  }

  if (currentMode === 'day') {
    dayEntries.forEach(entry => {
      labels.push(`${entry.time}`);
      data.push(entry.weight);
    });
    renderChart(labels, data);
    return;
  }   
}

function renderChart(labels, data) {
  if (!labels.length || !data.length) {
    let hour = 0;
    let minute = 0;

    // for (let i = 0; i < 288; i++) {

    //   // Formatăm minutele și orele corect
    //   const hh = hour.toString().padStart(2, '0');
    //   const mm = minute.toString().padStart(2, '0');

    //   labels.push(`${hh}:${mm}`);
    //   data.push(21.76 + (i % 20));

    //   // Incrementăm timpul cu 5 minute
    //   minute += 5;

    //   if (minute >= 60) {
    //     minute = minute % 60;
    //     hour++;
    //   }

    //   if (hour >= 24) {
    //     hour = 0;
    //   }
    // }

    labels.push("No data!");
    data.push(0);
  }
  setTimeout(() => {
    const ctx = document.getElementById('weightChart').getContext('2d');

    if (chart) chart.destroy();

    chart = new MiniChart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Weight (Kg)',
          data,
          borderColor: '#007bff',
          backgroundColor: 'rgba(0, 123, 255, 0.1)',
          tension: 0.2,
          pointRadius: 3
        }]
      },
      options: {
        maintainAspectRatio: false,
        responsive: true,
        scales: {
          x: {
            title: {
              display: true,
              text: currentMode === 'day' ? 'Time (HH:MM)' : (currentMode === 'month' ? 'Days' : 'Months')
            }
          },
          y: {
            title: {
              display: true,
              text: 'Weight (Kg)'
            }
          }
        }
      }
    });
  }, 150); // Delay pentru a asigura că canvas-ul este gata

  console.log(
    "\nCanvas size:",
    document.getElementById('weightChart').width,
    document.getElementById('weightChart').height,
    "\nCanvas labels:", labels,
    "\nCanvas data:", data
  );
}
// Calendar logic
function renderCalendar() {
  const grid = document.getElementById("calendarGrid");
  const monthLabel = document.getElementById("monthLabel");
  const yearLabel = document.getElementById("yearLabel");

  grid.innerHTML = `
    <div class="weekday">Lu</div>
    <div class="weekday">Ma</div>
    <div class="weekday">Mi</div>
    <div class="weekday">Jo</div>
    <div class="weekday">Vi</div>
    <div class="weekday">Sa</div>
    <div class="weekday">Du</div>
  `;

  const months = [
    "Ianuarie","Februarie","Martie","Aprilie","Mai","Iunie",
    "Iulie","August","Septembrie","Octombrie","Noiembrie","Decembrie"
  ];

  monthLabel.textContent = months[selectedMonth];
  yearLabel.textContent = selectedYear;

  const firstDay = new Date(selectedYear, selectedMonth, 1).getDay();
  const daysInMonth = new Date(selectedYear, selectedMonth + 1, 0).getDate();

  let start = firstDay === 0 ? 6 : firstDay - 1;

  for (let i = 0; i < start; i++) {
    const empty = document.createElement("div");
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const day = document.createElement("div");
    day.classList.add("day");
    day.textContent = d;

    if (d === selectedDay) {
      day.classList.add("selected");
    }

    day.addEventListener("click", () => {
      selectedDay = d;
      renderCalendar();
      console.log(`Ai selectat: ${selectedYear}-${selectedMonth+1}-${selectedDay}`);
      updateEntries();
    });

    grid.appendChild(day);
  }
}

// Navigare lună
document.getElementById("prevMonth").addEventListener("click", () => {
  selectedMonth--;
  if (selectedMonth < 0) {
    selectedMonth = 11;
    selectedYear--;
  }
  renderCalendar();
  updateEntries();
});

document.getElementById("nextMonth").addEventListener("click", () => {
  selectedMonth++;
  if (selectedMonth > 11) {
    selectedMonth = 0;
    selectedYear++;
  }
  renderCalendar();
  updateEntries();
});

// Navigare an
document.getElementById("prevYear").addEventListener("click", () => {
  selectedYear--;
  renderCalendar();
  updateEntries();
});

document.getElementById("nextYear").addEventListener("click", () => {
  selectedYear++;
  renderCalendar();
  updateEntries();
});

renderCalendar();

// Mini Chart script class
class MiniChart {
    constructor(ctx, config) {
        this.ctx = ctx;
        this.config = config;
        this.draw();
    }

    destroy() {
        this.ctx.clearRect(0, 0, this.ctx.canvas.width, this.ctx.canvas.height);
    }

    draw() {
        const { labels, datasets } = this.config.data;
        const { x, y } = this.config.options.scales;

        const data = datasets[0].data;
        const color = datasets[0].borderColor || "#007bff";
        const pointRadius = datasets[0].pointRadius || 3;

        const canvas = this.ctx.canvas;
        const ctx = this.ctx;

        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;

        const W = canvas.width;
        const H = canvas.height;

        const margin = 60;

        const minY = Math.min(...data);
        const maxY = Math.max(...data);

        // === SCALE X ===
        const scaleX = (i) => {
            if (labels.length === 1) {
                return W / 2; // un singur punct → centrat
            }
            return margin + (i / (labels.length - 1)) * (W - margin * 2);
        };

        // === SCALE Y ===
        let yMin = minY;
        let yMax = maxY;

        if (minY === maxY) {
            // un singur punct → range minim
            yMin = minY;
            yMax = maxY + 1;
        }

        const scaleY = (v) => {
            return H - margin - ((v - yMin) / (yMax - yMin)) * (H - margin * 2);
        };

        ctx.clearRect(0, 0, W, H);

        // AXA X
        ctx.beginPath();
        ctx.moveTo(margin, H - margin);
        ctx.lineTo(W - margin, H - margin);
        ctx.stroke();

        // AXA Y
        ctx.beginPath();
        ctx.moveTo(margin, margin);
        ctx.lineTo(margin, H - margin);
        ctx.stroke();

        // Titlu axă X
        ctx.font = "12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(x.title.text, W / 2, H - 5);

        // Titlu axă Y
        ctx.save();
        ctx.translate(15, H / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText(y.title.text, 0, 0);
        ctx.restore();

       // === MARCAJE AXA X CU ETICHETE ROTITE ===

        // 1. Spațiul minim necesar pentru o etichetă
        const minLabelSpacing = 30;

        // 2. Câte etichete încap pe axă
        const maxXTicks = Math.floor((W - margin * 2) / minLabelSpacing);

        // 3. Determinăm pasul optim
        const step = Math.ceil(labels.length / maxXTicks);

        // 4. Vector vizibilitate
        const visible = new Array(labels.length).fill(false);

        // 5. Marcăm etichetele vizibile
        for (let i = 0; i < labels.length; i += step) {
            visible[i] = true;
        }

        // 6. Forțăm ultima etichetă
        visible[labels.length - 1] = true;

        // 7. Desenăm etichetele rotite
        ctx.save();
        ctx.font = "10px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";

        const angle = -45 * Math.PI / 180;  // rotire -45°
        const offsetY = 1;                  // distanță suplimentară pentru a evita suprapunerea cu axa
        const offsetX = -10;                  // poți ajusta și orizontal dacă e necesar

        for (let i = 0; i < labels.length; i++) {
            if (!visible[i]) continue;

            let px = scaleX(i);
            let py = H - margin + 12 + offsetY;  // ridicăm eticheta

            ctx.save();
            ctx.translate(px + offsetX, py);
            ctx.rotate(angle);
            ctx.fillText(labels[i], 0, 0);
            ctx.restore();

            // Linie mică de marcaj
            ctx.beginPath();
            ctx.moveTo(px, H - margin);
            ctx.lineTo(px, H - margin - 5);
            ctx.stroke();
        }
        ctx.restore();

        // === MARCAJE AXA Y ===
        // Înălțimea minimă necesară pentru o etichetă Y (în px)
        const minYLabelSpacing = 20;

        // Câte etichete încap pe axa Y
        const maxYTicks = Math.floor((H - margin * 2) / minYLabelSpacing);
        if (maxYTicks < 2) maxYTicks = 2; // minim 2 etichete

        // Dacă intervalul e prea mic, evităm împărțirea la zero
        const yRange = maxY - minY || 1;

        // Pasul dintre etichete
        const stepY = yRange / maxYTicks;

        ctx.font = "10px Arial";

        ctx.textAlign = "right";

        for (let i = 0; i <= maxYTicks; i++) {
          const value = minY + i * stepY;
          const py = scaleY(value);

          // Etichetă Y
          ctx.fillText(value.toFixed(2), margin - 5, py + 3);

          // Linie punctată paralelă cu axa X
          ctx.strokeStyle = "#cccccc";     // culoare gri deschis
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 4]);         // model punctat: 4px linie, 4px spațiu

          ctx.beginPath();
          ctx.moveTo(margin, py);
          ctx.lineTo(W - margin, py);
          ctx.stroke();

          ctx.setLineDash([]);             // resetăm pentru alte desene
      }


        // Linie grafic
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;

        data.forEach((v, i) => {
            const px = scaleX(i);
            const py = scaleY(v);
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        });

        ctx.stroke();

        // Puncte
        ctx.fillStyle = color;
        data.forEach((v, i) => {
            const px = scaleX(i);
            const py = scaleY(v);
            ctx.beginPath();
            ctx.arc(px, py, pointRadius, 0, Math.PI * 2);
            ctx.fill();
        });
    }
}


</script>

</body>
</html>
